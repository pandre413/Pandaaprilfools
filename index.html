<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f1eb;
    font-family: 'Fredoka', sans-serif;
  }

  .card {
    background: #f8d7da;
    padding: 50px 30px;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 500px;
  }

  img {
    width: 180px;
    margin-bottom: 20px;
    border-radius: 20px;
  }

  h1 {
    color: #4f5d53;
    font-size: 3.5em;
    margin: 0 0 10px 0;
  }

  p {
    color: #4f5d53;
    font-size: 2.6em;
    margin: 0;
  }
</style>
</head>

<body>

<div class="card">
  <img src="fan.png" alt="fan">
  <h1>Gotcha! 😄</h1>
  <p>Happy April Fool's!<br>It's a prank! 💜</p>
</div>

</body>
</html>
