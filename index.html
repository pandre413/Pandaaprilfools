<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗</title>

<!-- Cute rounded font -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f1eb; /* cream */
    font-family: 'Fredoka', sans-serif;
  }

  .card {
    background: #f8d7da; /* soft pink */
    padding: 60px 40px;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 500px;
  }

  h1 {
    color: #4f5d53; /* sage */
    font-size: 3.5em;
    margin: 0  }
</style>
</head>

<body>

<div class="card">
  <div class="emoji">🎀✨</div>
  <h1>Gotcha! 😄</h1>
  <p>Happy April Fool's!<br>It's a prank 💗</p>

  <!-- floating hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">💗</div>
  <div class="heart" style="left:80%; animation-delay:2s;">💗</div>
  <div class="heart" style="left:50%; animation-delay:4s;">💗</div>
</div>

</body>
</html>
