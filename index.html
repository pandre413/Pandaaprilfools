<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Shapes and Animations</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        .shape {
            position: absolute;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        .circle {
            width: 50px;
            height: 50px;
            background-color: #ff7f50;
            border-radius: 50%;
        }
        .triangle {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #4caf50;
        }
        h1 {
            position: absolute;
            top: 50px;
            font-size: 2.5em;
            color: #ff6347;
            text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.3);
            animation: text-float 3s ease-in-out infinite;
        }
        @keyframes text-float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>Welcome to Fun Shapes and Animations!</h1>
    <div class="shape circle" style="top: 100px; left: 100px;"></div>
    <div class="shape circle" style="top: 500px; left: 300px;"></div>
    <div class="shape triangle" style="top: 300px; left: 600px;"></div>
    <script>
        function createRandomShapes() {
            const shapes = ['circle', 'triangle'];
            for (let i = 0; i < 10; i++) {
                const shape = document.createElement('div');
                const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
                shape.classList.add('shape', shapeType);
                shape.style.top = Math.random() * window.innerHeight + 'px';
                shape.style.left = Math.random() * window.innerWidth + 'px';
                document.body.appendChild(shape);
            }
        }
        createRandomShapes();
    </script>
</body>
</html>
