<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Segoe UI", "Poppins", sans-serif;
    background: linear-gradient(180deg, #e9b7bd 40%, #f5f1eb 40%);
  }

  .card {
    background: #f5f1eb;
    padding: 50px 40px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    max-width: 350px;
    position: relative;
  }

  h1 {
    color: #4f5d53;
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  p {
    color: #6b7a70;
    font-size: 1.1em;
  }

  .emoji {
    font-size: 2em;
    margin-bottom: 10px;
    animation: float 2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* floating hearts */
  .heart {
    position: absolute;
    color: #e9b7bd;
    font-size: 1.2em;
    animation: rise 6s infinite ease-in;
  }

  @keyframes rise {
    0% {
      transform: translateY(20px);
      opacity: 0;
    }
    50% {
      opacity: 1;
    }
    100% {
      transform: translateY(-120px);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<div class="card">
  <div class="emoji">🎀✨</div>
  <h1>Gotcha! 😄</h1>
  <p>Happy April Fool's!<br>It's a prank 💗</p>

  <!-- floating hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">💗</div>
  <div class="heart" style="left:80%; animation-delay:2s;">💗</div>
  <div class="heart" style="left:50%; animation-delay:4s;">💗</div>
</div>

</body>
</html>
